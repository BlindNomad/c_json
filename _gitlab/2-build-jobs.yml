build:linux:
  extends: .default_build
  stage: build
  script:
    - bash _scripts/fetch_deps.sh
    - mkdir -p ${BUILD_DIR}
    - cd ${BUILD_DIR}
    - cmake ../.. -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE}
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/linux/c_json_tests
      - build/linux/libc_json.so
    expire_in: 1 day
