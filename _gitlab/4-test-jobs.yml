test:gtest:
  extends: .default_build
  stage: test
  needs:
    - job: build:linux
      artifacts: true
  script:
    - cd ${BUILD_DIR}
    - ctest --output-on-failure --verbose

test:coverage:
  extends: .default_build
  stage: test
  script:
    - bash _scripts/tests/coverage.sh
  artifacts:
    when: always
    paths:
      - coverage/cobertura-coverage.xml
      - coverage/html/
    expire_in: 1 week

test:valgrind:
  extends: .default_build
  stage: test
  needs:
    - job: build:linux
      artifacts: true
  script:
    - bash _scripts/tests/valgrind.sh

test:fuzz:
  image: clang:18
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake curl
    - bash _scripts/fetch_deps.sh
  variables:
    FUZZ_TIME: "120"
  script:
    - bash _scripts/tests/fuzz.sh
  allow_failure: true
