variables:
  BUILD_DIR: build/linux
  CMAKE_BUILD_TYPE: Debug

.default_build:
  image: gcc:13
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake curl gcovr valgrind python3-pip
    - pip3 install --break-system-packages gcovr 2>/dev/null || pip3 install gcovr
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - build/linux/_deps/
      - inc/cJSON.h
      - src/cJSON.c

.quality_base:
  image: gcc:13
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cppcheck cpplint flawfinder
